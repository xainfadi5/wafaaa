name: Ubuntu VNC (Cloudflare)

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Desktop Environment & VNC
        run: |
          sudo apt update
          sudo apt install xfce4 xfce4-goodies tightvncserver git curl -y

          mkdir -p ~/.vnc
          echo "12345678" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          echo '#!/bin/bash
          export XKL_XMODMAP_DISABLE=1
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          startxfce4 &' > ~/.vnc/xstartup

          chmod +x ~/.vnc/xstartup

          vncserver :1 -geometry 1280x720 -depth 24

      - name: Setup noVNC
        run: |
          git clone https://github.com/novnc/noVNC.git ~/noVNC
          git clone https://github.com/novnc/websockify ~/noVNC/utils/websockify

          ~/noVNC/utils/websockify/run 6080 localhost:5901 &
          sleep 10

      - name: Setup Cloudflare Tunnel
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

          ./cloudflared tunnel --url http://localhost:6080 > cf.log 2>&1 &

          sleep 15

          echo "====== YOUR LINK ======"
          cat cf.log | grep trycloudflare.com || true

      - name: Keep Alive
        run: sleep 3600
